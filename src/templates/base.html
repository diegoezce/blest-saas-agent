<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Blest Lead Discovery{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAzMiAzMicgd2lkdGg9JzMyJyBoZWlnaHQ9JzMyJz4KICA8cmVjdCB3aWR0aD0nMzInIGhlaWdodD0nMzInIHJ4PSc2JyBmaWxsPScjMGYxNzJhJy8+CiAgPHRleHQgeD0nMTYnIHk9JzIzJyB0ZXh0LWFuY2hvcj0nbWlkZGxlJyBmb250LWZhbWlseT0nc3lzdGVtLXVpLC1hcHBsZS1zeXN0ZW0sc2Fucy1zZXJpZicgZm9udC13ZWlnaHQ9JzgwMCcgZm9udC1zaXplPScyMicgZmlsbD0nIzM4YmRmOCc+QjwvdGV4dD4KPC9zdmc+">
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-hover: #263549;
      --border: #2d3f55;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --green: #4ade80;
      --amber: #fbbf24;
      --red: #f87171;
      --purple: #a78bfa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Header */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .logo span { color: var(--accent); }
    nav { display: flex; gap: 1.25rem; align-items: center; overflow-x: auto; scrollbar-width: none; }
    nav::-webkit-scrollbar { display: none; }
    nav a { color: var(--muted); font-size: 0.9rem; white-space: nowrap; }
    nav a:hover { color: var(--text); text-decoration: none; }
    .nav-search-form { display: flex; align-items: center; gap: 0; }
    .nav-search-input {
      background: #0f172a;
      border: 1px solid var(--border);
      border-radius: 6px 0 0 6px;
      padding: 0.28rem 0.6rem;
      color: var(--text);
      font-size: 0.82rem;
      width: 160px;
      outline: none;
      transition: border-color 0.15s, width 0.2s;
    }
    .nav-search-input:focus { border-color: var(--accent); width: 200px; }
    .nav-search-input::placeholder { color: #475569; }
    .nav-search-btn {
      background: var(--border);
      border: 1px solid var(--border);
      border-left: none;
      border-radius: 0 6px 6px 0;
      padding: 0.28rem 0.55rem;
      color: var(--muted);
      font-size: 0.8rem;
      cursor: pointer;
      line-height: 1;
    }
    .nav-search-btn:hover { background: var(--surface-hover); color: var(--text); }
    nav .nav-sep { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }
    @media (max-width: 600px) {
      header { padding: 0 1rem; gap: 0.75rem; }
      .logo { font-size: 0.88rem; flex-shrink: 0; }
      nav { gap: 0.75rem; }
      nav a { font-size: 0.8rem; }
      .nav-search-input { width: 90px; font-size: 0.75rem; }
      .nav-search-input:focus { width: 110px; }
    }

    /* Layout */
    main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
    }

    /* Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .badge-green  { background: #14532d; color: var(--green); }
    .badge-amber  { background: #451a03; color: var(--amber); }
    .badge-red    { background: #450a0a; color: var(--red); }
    .badge-blue   { background: #0c4a6e; color: var(--accent); }
    .badge-muted  { background: #1e293b; color: var(--muted); border: 1px solid var(--border); }

    /* Score pill */
    .score {
      display: inline-block;
      min-width: 40px;
      text-align: center;
      padding: 0.1rem 0.5rem;
      border-radius: 6px;
      font-weight: 700;
      font-size: 0.85rem;
    }
    .score-high { background: #14532d; color: var(--green); }
    .score-mid  { background: #451a03; color: var(--amber); }
    .score-low  { background: #450a0a; color: var(--red); }

    /* Section headers */
    .section-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 1rem;
    }

    /* Utility */
    .text-muted { color: var(--muted); }
    .text-green { color: var(--green); }
    .text-amber { color: var(--amber); }
    .text-red   { color: var(--red); }
    .text-accent { color: var(--accent); }
    .mt-1 { margin-top: 0.5rem; }
    .mt-2 { margin-top: 1rem; }
    .mt-3 { margin-top: 1.5rem; }
    .mt-4 { margin-top: 2rem; }
    .gap-2 { gap: 1rem; }
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .wrap { flex-wrap: wrap; }
    .grid-2 { display: grid; grid-template-columns: repeat(auto-fill, minmax(480px, 1fr)); gap: 1rem; }
  
    /* Log panel */
    #log-panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #0a0f1e;
      border-top: 1px solid var(--border);
      z-index: 500;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 0.78rem;
    }
    #log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.4rem 1rem;
      cursor: pointer;
      user-select: none;
      gap: 1rem;
    }
    #log-header:hover { background: rgba(255,255,255,0.03); }
    #log-body {
      height: 220px;
      overflow-y: auto;
      padding: 0.5rem 1rem 0.75rem;
      display: none;
    }
    #log-body.open { display: block; }
    .log-line { padding: 0.1rem 0; line-height: 1.5; white-space: pre-wrap; word-break: break-all; }
    .log-INFO    { color: #64748b; }
    .log-WARNING { color: var(--amber); }
    .log-ERROR   { color: var(--red); }
    .log-DEBUG   { color: #334155; }
    /* push page content above panel */
    body { padding-bottom: 36px; }
    body.logs-open { padding-bottom: 256px; }
  </style>
</head>
<body>
  <header>
    <div class="logo">🎯 <span>Blest</span> Lead Discovery</div>
    <nav>
      <form class="nav-search-form" method="get" action="/search">
        <input class="nav-search-input" type="text" name="q" placeholder="🔍 buscar…" value="{{ request.args.get('q', '') if request else '' }}">
        <button class="nav-search-btn" type="submit">→</button>
      </form>
      <span class="nav-sep"></span>
      <a href="/quick-run">⚡ Quick Run</a>
      <a href="/">Runs</a>
      <a href="/contacts-report">Contactados</a>
      <a href="/profiles">Perfiles</a>
      <span class="nav-sep"></span>
      <a href="/logout" style="color:#f87171">Salir</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Log panel -->
  <div id="log-panel">
    <div id="log-header" onclick="toggleLogs()">
      <div style="display:flex;align-items:center;gap:0.75rem">
        <span style="color:var(--muted);font-size:0.8rem;font-family:monospace">Logs</span>
        <span id="log-badge" style="background:#1e293b;color:var(--muted);padding:0.1rem 0.45rem;border-radius:999px;font-size:0.7rem;font-family:monospace">0</span>
        <span id="log-status" style="font-size:0.7rem;color:#334155"></span>
      </div>
      <span id="log-arrow" style="color:var(--muted);font-size:0.75rem">▲ expandir</span>
    </div>
    <div id="log-body">
      <div id="log-lines"></div>
    </div>
  </div>

  <script>
    var _logOpen = false;
    var _lastId = 0;
    var _lineCount = 0;
    var _atBottom = true;

    function toggleLogs() {
      _logOpen = !_logOpen;
      document.getElementById('log-body').classList.toggle('open', _logOpen);
      document.getElementById('log-arrow').textContent = _logOpen ? '▼ ocultar' : '▲ expandir';
      document.body.classList.toggle('logs-open', _logOpen);
      if (_logOpen) scrollToBottom();
    }

    function scrollToBottom() {
      var el = document.getElementById('log-body');
      el.scrollTop = el.scrollHeight;
    }

    function levelClass(level) {
      if (level === 'WARNING') return 'log-WARNING';
      if (level === 'ERROR' || level === 'CRITICAL') return 'log-ERROR';
      if (level === 'DEBUG') return 'log-DEBUG';
      return 'log-INFO';
    }

    function appendLines(lines) {
      if (!lines.length) return;
      var container = document.getElementById('log-lines');
      var body = document.getElementById('log-body');
      _atBottom = body.scrollHeight - body.scrollTop - body.clientHeight < 40;
      lines.forEach(function(l) {
        var div = document.createElement('div');
        div.className = 'log-line ' + levelClass(l.level);
        div.textContent = '[' + l.level.substring(0,1) + '] ' + l.text;
        container.appendChild(div);
        _lineCount++;
      });
      document.getElementById('log-badge').textContent = _lineCount;
      if (_atBottom && _logOpen) scrollToBottom();
    }

    function fetchLogs() {
      fetch('/logs?since=' + _lastId)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.lines && data.lines.length) appendLines(data.lines);
          if (data.last_id) _lastId = data.last_id;
          document.getElementById('log-status').textContent = '';
        })
        .catch(function() {
          document.getElementById('log-status').textContent = '● sin conexión';
        });
    }

    fetchLogs();
    setInterval(fetchLogs, 2000);
  </script>
</body>
</html>
