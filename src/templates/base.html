<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Blest Lead Discovery{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAzMiAzMicgd2lkdGg9JzMyJyBoZWlnaHQ9JzMyJz4KICA8cmVjdCB3aWR0aD0nMzInIGhlaWdodD0nMzInIHJ4PSc2JyBmaWxsPScjMGYxNzJhJy8+CiAgPHRleHQgeD0nMTYnIHk9JzIzJyB0ZXh0LWFuY2hvcj0nbWlkZGxlJyBmb250LWZhbWlseT0nc3lzdGVtLXVpLC1hcHBsZS1zeXN0ZW0sc2Fucy1zZXJpZicgZm9udC13ZWlnaHQ9JzgwMCcgZm9udC1zaXplPScyMicgZmlsbD0nIzM4YmRmOCc+QjwvdGV4dD4KPC9zdmc+">
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-hover: #263549;
      --border: #2d3f55;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --green: #4ade80;
      --amber: #fbbf24;
      --red: #f87171;
      --purple: #a78bfa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Header */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .logo span { color: var(--accent); }
    nav { display: flex; gap: 1.25rem; align-items: center; overflow-x: auto; scrollbar-width: none; }
    nav::-webkit-scrollbar { display: none; }
    nav a { color: var(--muted); font-size: 0.9rem; white-space: nowrap; }
    nav a:hover { color: var(--text); text-decoration: none; }
    .nav-search-form { display: flex; align-items: center; gap: 0; }
    .nav-search-input {
      background: #0f172a;
      border: 1px solid var(--border);
      border-radius: 6px 0 0 6px;
      padding: 0.28rem 0.6rem;
      color: var(--text);
      font-size: 0.82rem;
      width: 160px;
      outline: none;
      transition: border-color 0.15s, width 0.2s;
    }
    .nav-search-input:focus { border-color: var(--accent); width: 200px; }
    .nav-search-input::placeholder { color: #475569; }
    .nav-search-btn {
      background: var(--border);
      border: 1px solid var(--border);
      border-left: none;
      border-radius: 0 6px 6px 0;
      padding: 0.28rem 0.55rem;
      color: var(--muted);
      font-size: 0.8rem;
      cursor: pointer;
      line-height: 1;
    }
    .nav-search-btn:hover { background: var(--surface-hover); color: var(--text); }
    nav .nav-sep { width: 1px; height: 18px; background: var(--border); flex-shrink: 0; }
    @media (max-width: 600px) {
      header { padding: 0 1rem; gap: 0.75rem; }
      .logo { font-size: 0.88rem; flex-shrink: 0; }
      nav { gap: 0.75rem; }
      nav a { font-size: 0.8rem; }
      .nav-search-input { width: 90px; font-size: 0.75rem; }
      .nav-search-input:focus { width: 110px; }
    }

    /* Layout */
    main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
    }

    /* Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .badge-green  { background: #14532d; color: var(--green); }
    .badge-amber  { background: #451a03; color: var(--amber); }
    .badge-red    { background: #450a0a; color: var(--red); }
    .badge-blue   { background: #0c4a6e; color: var(--accent); }
    .badge-muted  { background: #1e293b; color: var(--muted); border: 1px solid var(--border); }

    /* Score pill */
    .score {
      display: inline-block;
      min-width: 40px;
      text-align: center;
      padding: 0.1rem 0.5rem;
      border-radius: 6px;
      font-weight: 700;
      font-size: 0.85rem;
    }
    .score-high { background: #14532d; color: var(--green); }
    .score-mid  { background: #451a03; color: var(--amber); }
    .score-low  { background: #450a0a; color: var(--red); }

    /* Section headers */
    .section-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 1rem;
    }

    /* Utility */
    .text-muted { color: var(--muted); }
    .text-green { color: var(--green); }
    .text-amber { color: var(--amber); }
    .text-red   { color: var(--red); }
    .text-accent { color: var(--accent); }
    .mt-1 { margin-top: 0.5rem; }
    .mt-2 { margin-top: 1rem; }
    .mt-3 { margin-top: 1.5rem; }
    .mt-4 { margin-top: 2rem; }
    .gap-2 { gap: 1rem; }
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .wrap { flex-wrap: wrap; }
    .grid-2 { display: grid; grid-template-columns: repeat(auto-fill, minmax(480px, 1fr)); gap: 1rem; }
  
    /* Log panel */
    #log-panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #0a0f1e;
      border-top: 1px solid var(--border);
      z-index: 500;
      font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 0.78rem;
    }
    #log-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.4rem 1rem;
      cursor: pointer;
      user-select: none;
      gap: 1rem;
    }
    #log-header:hover { background: rgba(255,255,255,0.03); }
    #log-body {
      height: 220px;
      overflow-y: auto;
      padding: 0.5rem 1rem 0.75rem;
      display: none;
    }
    #log-body.open { display: block; }
    .log-line { padding: 0.1rem 0; line-height: 1.5; white-space: pre-wrap; word-break: break-all; }
    .log-INFO    { color: #64748b; }
    .log-WARNING { color: var(--amber); }
    .log-ERROR   { color: var(--red); }
    .log-DEBUG   { color: #334155; }
    /* push page content above panel */
    body { padding-bottom: 36px; }
    body.logs-open { padding-bottom: 256px; }

    /* Company Details Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
      padding: 1rem;
      animation: fadeIn 0.15s ease-out;
    }
    .modal-overlay.open { display: flex; }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .modal-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      max-width: 500px;
      width: 100%;
      max-height: 75vh;
      overflow-y: auto;
      animation: slideUp 0.2s ease-out;
      margin: auto;
    }
    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
      gap: 0.75rem;
    }
    .modal-title { font-size: 1.2rem; font-weight: 800; line-height: 1.2; }
    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      flex-shrink: 0;
    }
    .modal-close:hover { color: var(--text); }
    .modal-field {
      margin-bottom: 0.75rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .modal-field:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }
    .modal-label {
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
      margin-bottom: 0.25rem;
      display: block;
    }
    .modal-value {
      font-size: 0.85rem;
      color: var(--text);
      word-break: break-word;
    }
    .modal-value a {
      color: var(--accent);
    }
    .modal-value a:hover { text-decoration: underline; }
    .company-name-link {
      cursor: pointer;
      border-bottom: 1px dotted var(--accent);
      transition: color 0.15s;
    }
    .company-name-link:hover { color: var(--accent); }
  </style>
</head>
<body>
  <header>
    <div class="logo">🎯 <span>Blest</span> Lead Discovery</div>
    <nav>
      <form class="nav-search-form" method="get" action="/search">
        <input class="nav-search-input" type="text" name="q" placeholder="🔍 buscar…" value="{{ request.args.get('q', '') if request else '' }}">
        <button class="nav-search-btn" type="submit">→</button>
      </form>
      <span class="nav-sep"></span>
      <a href="/quick-run">⚡ Quick Run</a>
      <a href="/">Runs</a>
      <a href="/contacts-report">Contactados</a>
      <a href="/follow-ups">Follow-ups</a>
      <a href="/profiles">Perfiles</a>
      <span class="nav-sep"></span>
      <a href="/logout" style="color:#f87171">Salir</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Company Details Modal -->
  <div id="company-modal" class="modal-overlay">
    <div class="modal-content">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; gap: 1rem;">
        <h2 class="modal-title" id="modal-company-name">Empresa</h2>
        <button onclick="closeCompanyModal()" style="background: transparent; border: none; color: var(--text); font-size: 1.5rem; cursor: pointer; padding: 0; line-height: 1; flex-shrink: 0;">✕</button>
      </div>
      <div id="modal-edit-btn-container" style="margin-bottom: 1rem;">
        <button id="modal-edit-btn" onclick="toggleEditMode()" style="background: var(--surface-hover); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 0.6rem 1rem; font-size: 0.9rem; font-weight: 600; cursor: pointer; width: 100%;">✏️ Editar</button>
      </div>
      <div id="modal-body">
        <div style="text-align: center; color: var(--muted);">Cargando...</div>
      </div>
      <div id="modal-actions" style="display: none; gap: 0.5rem; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border);">
        <button onclick="saveCompanyChanges()" style="flex: 1; background: var(--green); color: #fff; border: none; border-radius: 6px; padding: 0.6rem 1rem; font-size: 0.85rem; font-weight: 600; cursor: pointer;">💾 Guardar</button>
        <button onclick="toggleEditMode()" style="flex: 1; background: var(--surface-hover); color: var(--muted); border: 1px solid var(--border); border-radius: 6px; padding: 0.6rem 1rem; font-size: 0.85rem; font-weight: 600; cursor: pointer;">✕ Cancelar</button>
      </div>
    </div>
  </div>

  <!-- Log panel -->
  <div id="log-panel">
    <div id="log-header" onclick="toggleLogs()">
      <div style="display:flex;align-items:center;gap:0.75rem">
        <span style="color:var(--muted);font-size:0.8rem;font-family:monospace">Logs</span>
        <span id="log-badge" style="background:#1e293b;color:var(--muted);padding:0.1rem 0.45rem;border-radius:999px;font-size:0.7rem;font-family:monospace">0</span>
        <span id="log-status" style="font-size:0.7rem;color:#334155"></span>
      </div>
      <span id="log-arrow" style="color:var(--muted);font-size:0.75rem">▲ expandir</span>
    </div>
    <div id="log-body">
      <div id="log-lines"></div>
    </div>
  </div>

  <script>
    var _logOpen = false;
    var _lastId = 0;
    var _lineCount = 0;
    var _atBottom = true;

    function toggleLogs() {
      _logOpen = !_logOpen;
      document.getElementById('log-body').classList.toggle('open', _logOpen);
      document.getElementById('log-arrow').textContent = _logOpen ? '▼ ocultar' : '▲ expandir';
      document.body.classList.toggle('logs-open', _logOpen);
      if (_logOpen) scrollToBottom();
    }

    function scrollToBottom() {
      var el = document.getElementById('log-body');
      el.scrollTop = el.scrollHeight;
    }

    function levelClass(level) {
      if (level === 'WARNING') return 'log-WARNING';
      if (level === 'ERROR' || level === 'CRITICAL') return 'log-ERROR';
      if (level === 'DEBUG') return 'log-DEBUG';
      return 'log-INFO';
    }

    function appendLines(lines) {
      if (!lines.length) return;
      var container = document.getElementById('log-lines');
      var body = document.getElementById('log-body');
      _atBottom = body.scrollHeight - body.scrollTop - body.clientHeight < 40;
      lines.forEach(function(l) {
        var div = document.createElement('div');
        div.className = 'log-line ' + levelClass(l.level);
        div.textContent = '[' + l.level.substring(0,1) + '] ' + l.text;
        container.appendChild(div);
        _lineCount++;
      });
      document.getElementById('log-badge').textContent = _lineCount;
      if (_atBottom && _logOpen) scrollToBottom();
    }

    function fetchLogs() {
      fetch('/logs?since=' + _lastId)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.lines && data.lines.length) appendLines(data.lines);
          if (data.last_id) _lastId = data.last_id;
          document.getElementById('log-status').textContent = '';
        })
        .catch(function() {
          document.getElementById('log-status').textContent = '● sin conexión';
        });
    }

    fetchLogs();
    setInterval(fetchLogs, 2000);

    var _currentCompanyId = null;
    var _currentCompanyData = null;
    var _editMode = false;

    function openCompanyModal(companyId) {
      _currentCompanyId = companyId;
      _editMode = false;
      var modal = document.getElementById('company-modal');
      modal.classList.add('open');
      var btnContainer = document.getElementById('modal-edit-btn-container');
      var actions = document.getElementById('modal-actions');
      btnContainer.style.display = 'block';
      actions.style.display = 'none';
      var body = document.getElementById('modal-body');
      body.innerHTML = '<div style="text-align: center; color: var(--muted);">Cargando...</div>';

      fetch('/company/' + companyId + '/details')
        .then(function(r) {
          if (!r.ok) {
            throw new Error('HTTP error, status = ' + r.status);
          }
          return r.json();
        })
        .then(function(company) {
          if (company.error) {
            body.innerHTML = '<div style="color: var(--red);">Error cargando detalles</div>';
            return;
          }
          _currentCompanyData = company;
          document.getElementById('modal-company-name').textContent = company.name;
          renderCompanyFields(company, false);
        })
        .catch(function(err) {
          console.error('Error:', err);
          body.innerHTML = '<div style="color: var(--red);">Error cargando detalles: ' + err.message + '</div>';
        });
    }

    function _renderContactRow(contact, editMode) {
      var esc = function(s) { return (s||'').replace(/[<>"&]/g, function(c){return {'<':'&lt;','>':'&gt;','"':'&quot;','&':'&amp;'}[c];}); };
      var contactName = esc(contact.name);
      var contactRole = esc(contact.role);
      var contactEmail = esc(contact.email);
      var contactLinkedIn = esc(contact.linkedin_url);
      var isManual = contact.email_source === 'manual' && !contact.name && !contact.role;
      var isPrimary = contact.is_primary === true;
      var row = '<div id="modal-contact-row-' + contact.id + '" style="padding: 0.6rem; border: 1px solid var(--border); border-radius: 6px; background: rgba(255,255,255,0.02)">';
      if (editMode) {
        if (contactName) {
          row += '<div style="margin-bottom: 0.3rem;"><strong style="color: var(--text); font-size: 0.85rem;">' + contactName + '</strong>';
          if (contactRole) row += ' <em style="color: var(--muted); font-size: 0.8rem;">· ' + contactRole + '</em>';
          row += '</div>';
        }
        row += '<div style="display: flex; gap: 0.4rem; align-items: center;">';
        row += '<input type="email" data-contact-id="' + contact.id + '" placeholder="Correo..." value="' + contactEmail + '" style="flex: 1; padding: 0.45rem 0.5rem; border: 1px solid var(--border); border-radius: 4px; background: var(--surface); color: var(--text); font-size: 0.85rem;">';
        var primaryLabel = isPrimary ? '⭐' : '☆';
        var primaryTitle = isPrimary ? 'Email principal' : 'Marcar como email principal';
        row += '<button onclick="_setPrimaryContact(' + contact.id + ')" title="' + primaryTitle + '" style="background: ' + (isPrimary ? 'var(--accent)' : 'var(--surface-hover)') + '; color: ' + (isPrimary ? '#0f172a' : 'var(--muted)') + '; border: 1px solid var(--border); border-radius: 4px; padding: 0.35rem 0.5rem; font-size: 0.85rem; cursor: pointer;">' + primaryLabel + '</button>';
        if (isManual) {
          row += '<button onclick="_deleteManualContact(' + contact.id + ')" title="Eliminar email" style="background: none; color: #ef4444; border: 1px solid var(--border); border-radius: 4px; padding: 0.35rem 0.5rem; font-size: 0.85rem; cursor: pointer;">🗑</button>';
        }
        row += '</div>';
      } else {
        if (contactName) {
          row += '<div style="font-size: 0.85rem;"><strong>' + contactName + '</strong>';
          if (contactRole) row += ' · <em style="color: var(--muted);">' + contactRole + '</em>';
          row += '</div>';
        }
        if (contact.email) {
          row += '<div style="display: flex; align-items: center; gap: 0.35rem; flex-wrap: wrap; margin-top: 0.15rem;">';
          row += '<a href="mailto:' + contactEmail + '" style="font-size: 0.8rem; color: var(--accent);">' + contactEmail + '</a>';
          if (isPrimary) row += '<span title="Email principal" style="font-size: 0.75rem;">⭐</span>';
          row += '</div>';
        } else {
          row += '<div style="font-size: 0.8rem; color: var(--muted);">Sin email</div>';
        }
        if (contact.linkedin_url) {
          row += ' <a href="' + contactLinkedIn + '" target="_blank" style="font-size: 0.8rem; color: var(--muted);">LinkedIn ↗</a>';
        }
      }
      row += '</div>';
      return row;
    }

    function renderCompanyFields(company, editMode) {
      var body = document.getElementById('modal-body');
      var html = '';

      var editableFields = ['industry', 'size_estimate', 'location', 'description', 'website_url', 'linkedin_url'];
      var fields = [
        { key: 'name', label: 'Nombre', editable: false },
        { key: 'domain', label: 'Dominio', editable: false, isLink: true },
        { key: 'location', label: 'Ubicación', editable: true },
        { key: 'industry', label: 'Industria', editable: true },
        { key: 'size_estimate', label: 'Tamaño (estimado)', editable: true },
        { key: 'description', label: 'Descripción', editable: true, type: 'textarea' },
        { key: 'website_url', label: 'Sitio web', editable: true, isLink: true },
        { key: 'linkedin_url', label: 'LinkedIn', editable: true, isLink: true },
        { key: 'source', label: 'Fuente', editable: false },
        { key: 'source_url', label: 'URL Fuente', editable: false, isLink: true },
        { key: 'first_seen_at', label: 'Primero visto', editable: false },
        { key: 'last_updated_at', label: 'Último actualizado', editable: false },
      ];

      fields.forEach(function(field) {
        var value = company[field.key];
        if (value === null || value === undefined || value === '') value = null;

        if (value || field.editable) {
          html += '<div class="modal-field">';
          html += '<label class="modal-label">' + field.label + '</label>';

          if (editMode && field.editable) {
            if (field.type === 'textarea') {
              html += '<textarea data-field="' + field.key + '" style="width: 100%; min-height: 80px; padding: 0.5rem; border: 1px solid var(--border); border-radius: 4px; background: var(--surface); color: var(--text); font-family: inherit; font-size: 0.9rem;">' + (value || '') + '</textarea>';
            } else {
              html += '<input type="text" data-field="' + field.key + '" value="' + (value || '') + '" style="width: 100%; padding: 0.5rem; border: 1px solid var(--border); border-radius: 4px; background: var(--surface); color: var(--text); font-size: 0.9rem;">';
            }
          } else {
            if (field.isLink && value) {
              var href = value;
              if (!href.startsWith('http')) href = 'http://' + href;
              html += '<div class="modal-value"><a href="' + href + '" target="_blank">' + value.substring(0, 60) + (value.length > 60 ? '...' : '') + '</a></div>';
            } else {
              html += '<div class="modal-value">' + (value || 'No disponible') + '</div>';
            }
          }
          html += '</div>';
        }
      });

      // Contacts section
      var contactsList = company.contacts && company.contacts.length > 0 ? company.contacts : [];
      html += '<div class="modal-field">';
      html += '<label class="modal-label">Contactos</label>';
      html += '<div id="modal-contacts-list" style="display: flex; flex-direction: column; gap: 0.6rem;">';

      if (contactsList.length > 0) {
        contactsList.forEach(function(contact) {
          html += _renderContactRow(contact, editMode);
        });
      } else {
        html += '<div style="color: var(--muted); font-size: 0.85rem;">Sin contactos</div>';
      }

      if (editMode) {
        html += '<div id="modal-add-email-section" style="margin-top: 0.4rem; padding: 0.6rem; border: 1px dashed var(--border); border-radius: 6px;">';
        html += '<div style="font-size: 0.8rem; color: var(--muted); margin-bottom: 0.4rem;">Agregar email de contacto</div>';
        html += '<div style="display: flex; gap: 0.4rem;">';
        html += '<input type="email" id="modal-new-email-input" placeholder="nuevo@empresa.com" style="flex: 1; padding: 0.45rem 0.5rem; border: 1px solid var(--border); border-radius: 4px; background: var(--surface); color: var(--text); font-size: 0.85rem;">';
        html += '<button onclick="_addCompanyEmail()" style="background: var(--accent); color: #0f172a; border: none; border-radius: 4px; padding: 0.45rem 0.75rem; font-size: 0.8rem; font-weight: 700; cursor: pointer;">➕ Agregar</button>';
        html += '</div>';
        html += '</div>';
      }

      html += '</div>';
      html += '</div>';

      if (!html) {
        html = '<div style="color: var(--muted); text-align: center;">Sin datos disponibles</div>';
      }

      body.innerHTML = html;
    }

    function toggleEditMode() {
      _editMode = !_editMode;
      var btnContainer = document.getElementById('modal-edit-btn-container');
      var actions = document.getElementById('modal-actions');

      if (_editMode) {
        btnContainer.style.display = 'none';
        actions.style.display = 'flex';
      } else {
        btnContainer.style.display = 'block';
        actions.style.display = 'none';
      }

      renderCompanyFields(_currentCompanyData, _editMode);
    }

    function saveCompanyChanges() {
      if (!_currentCompanyId) return;

      var data = {};
      var inputs = document.querySelectorAll('[data-field]');
      inputs.forEach(function(input) {
        var field = input.getAttribute('data-field');
        var value = input.value;
        data[field] = value || null;
      });

      var contactUpdates = {};
      var promises = [
        fetch('/company/' + _currentCompanyId + '/update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        }).then(function(r) { return r.json(); })
      ];

      // Save contact emails
      var contactInputs = document.querySelectorAll('[data-contact-id]');
      contactInputs.forEach(function(input) {
        var contactId = input.getAttribute('data-contact-id');
        var email = input.value.trim();
        contactUpdates[contactId] = email;
        if (email) {
          promises.push(
            fetch('/contact/' + contactId + '/set-email', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ email: email })
            }).then(function(r) { return r.json(); })
          );
        }
      });

      Promise.all(promises)
        .then(function(results) {
          var hasErrors = results.some(function(r) { return r.error; });
          if (!hasErrors) {
            Object.keys(data).forEach(function(key) {
              _currentCompanyData[key] = data[key];
            });
            // Update contacts with new emails
            if (_currentCompanyData.contacts) {
              _currentCompanyData.contacts.forEach(function(contact) {
                if (contactUpdates[contact.id] !== undefined) {
                  contact.email = contactUpdates[contact.id];
                }
              });
            }
            _editMode = false;
            var editBtn = document.getElementById('modal-edit-btn');
            var actions = document.getElementById('modal-actions');
            editBtn.style.display = 'block';
            actions.style.display = 'none';
            renderCompanyFields(_currentCompanyData, false);
            alert('✅ Cambios guardados exitosamente');
          } else {
            alert('⚠️ Algunos cambios no se pudieron guardar');
          }
        })
        .catch(function(e) {
          alert('Error al guardar: ' + e);
        });
    }

    function closeCompanyModal() {
      var modal = document.getElementById('company-modal');
      modal.classList.remove('open');
    }

    function _setPrimaryContact(contactId) {
      fetch('/contact/' + contactId + '/set-primary', { method: 'POST' })
        .then(function(r) { return r.json(); })
        .then(function(d) {
          if (d.ok) {
            if (_currentCompanyData && _currentCompanyData.contacts) {
              _currentCompanyData.contacts.forEach(function(c) {
                c.is_primary = (c.id === contactId);
              });
            }
            renderCompanyFields(_currentCompanyData, true);
          } else {
            alert('Error al marcar como principal: ' + (d.error || 'desconocido'));
          }
        })
        .catch(function(e) { alert('Error: ' + e); });
    }

    function _deleteManualContact(contactId) {
      if (!confirm('¿Eliminar este email?')) return;
      fetch('/contact/' + contactId + '/delete-manual', { method: 'POST' })
        .then(function(r) { return r.json(); })
        .then(function(d) {
          if (d.ok) {
            if (_currentCompanyData && _currentCompanyData.contacts) {
              _currentCompanyData.contacts = _currentCompanyData.contacts.filter(function(c) {
                return c.id !== contactId;
              });
            }
            var row = document.getElementById('modal-contact-row-' + contactId);
            if (row) row.remove();
          } else {
            alert('Error al eliminar: ' + (d.error || 'desconocido'));
          }
        })
        .catch(function(e) { alert('Error: ' + e); });
    }

    function _addCompanyEmail() {
      var input = document.getElementById('modal-new-email-input');
      if (!input) return;
      var email = input.value.trim().toLowerCase();
      if (!email || !email.includes('@') || !email.split('@')[1].includes('.')) {
        alert('Email inválido'); return;
      }
      fetch('/company/' + _currentCompanyId + '/add-email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email }),
      })
        .then(function(r) { return r.json(); })
        .then(function(d) {
          if (d.ok && d.contact) {
            var newContact = { id: d.contact.id, email: d.contact.email, name: null, role: null, email_source: 'manual', is_primary: false };
            if (!_currentCompanyData.contacts) _currentCompanyData.contacts = [];
            _currentCompanyData.contacts.push(newContact);
            var list = document.getElementById('modal-contacts-list');
            if (list) {
              var addSection = document.getElementById('modal-add-email-section');
              var div = document.createElement('div');
              div.innerHTML = _renderContactRow(newContact, true);
              if (addSection) list.insertBefore(div.firstChild, addSection);
              else list.appendChild(div.firstChild);
            }
            input.value = '';
          } else {
            alert('Error al agregar: ' + (d.error || 'desconocido'));
          }
        })
        .catch(function(e) { alert('Error: ' + e); });
    }

    function openEditModal(companyId, companyName) {
      fetch('/company/' + companyId + '/details')
        .then(function(r) { return r.json(); })
        .then(function(company) {
          var modal = document.getElementById('company-modal');
          modal.classList.add('open');
          document.getElementById('modal-company-name').textContent = '✎ ' + companyName;

          var html = '<div style="display: flex; flex-direction: column; gap: 1.2rem;">';

          var fields = [
            { key: 'location', label: '📍 Ubicación', type: 'text', placeholder: 'Ej: Buenos Aires' },
            { key: 'industry', label: '🏢 Industria', type: 'text', placeholder: 'Ej: Technology' },
            { key: 'size_estimate', label: '👥 Tamaño (estimado)', type: 'text', placeholder: 'Ej: 50-100' },
            { key: 'description', label: '📝 Descripción', type: 'textarea', placeholder: 'Descripción de la empresa...' },
            { key: 'website_url', label: '🌐 Sitio web', type: 'text', placeholder: 'https://ejemplo.com' },
            { key: 'linkedin_url', label: '💼 LinkedIn', type: 'text', placeholder: 'https://linkedin.com/company/...' },
          ];

          fields.forEach(function(field) {
            var value = company[field.key] || '';
            html += '<div>';
            html += '<label style="display: block; font-weight: 700; margin-bottom: 0.5rem; font-size: 0.85rem; color: var(--text); text-transform: uppercase; letter-spacing: 0.05em;">' + field.label + '</label>';

            if (field.type === 'textarea') {
              html += '<textarea data-field="' + field.key + '" placeholder="' + field.placeholder + '" style="width: 100%; min-height: 100px; padding: 0.8rem; border: 2px solid var(--border); border-radius: 8px; background: #0f172a; color: var(--text); font-family: inherit; font-size: 0.95rem; transition: border-color 0.2s; resize: vertical;">' + value + '</textarea>';
            } else {
              html += '<input type="text" data-field="' + field.key + '" placeholder="' + field.placeholder + '" value="' + value.replace(/"/g, '&quot;') + '" style="width: 100%; padding: 0.8rem; border: 2px solid var(--border); border-radius: 8px; background: #0f172a; color: var(--text); font-size: 0.95rem; transition: border-color 0.2s;">';
            }
            html += '</div>';
          });

          html += '<div style="display: flex; gap: 0.75rem; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border);">';
          html += '<button onclick="saveEditModal(' + companyId + ')" style="flex: 1; background: var(--green); color: #fff; border: none; border-radius: 8px; padding: 0.9rem 1.2rem; font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: all 0.2s;">💾 Guardar cambios</button>';
          html += '<button onclick="closeCompanyModal()" style="flex: 1; background: transparent; color: var(--muted); border: 2px solid var(--border); border-radius: 8px; padding: 0.9rem 1.2rem; font-weight: 700; font-size: 0.95rem; cursor: pointer; transition: all 0.2s;">✕ Cancelar</button>';
          html += '</div></div>';

          document.getElementById('modal-body').innerHTML = html;
          document.getElementById('modal-edit-btn-container').style.display = 'none';
          document.getElementById('modal-actions').style.display = 'none';
        });
    }

    function saveEditModal(companyId) {
      var data = {};
      var inputs = document.querySelectorAll('[data-field]');
      inputs.forEach(function(input) {
        var field = input.getAttribute('data-field');
        var value = input.value;
        data[field] = value || null;
      });

      fetch('/company/' + companyId + '/update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      })
        .then(function(r) { return r.json(); })
        .then(function(result) {
          if (result.success) {
            alert('✅ Guardado exitosamente!');
            closeCompanyModal();
          } else {
            alert('❌ Error al guardar');
          }
        })
        .catch(function(e) {
          alert('Error: ' + e);
        });
    }

    // Close modal when clicking outside
    document.getElementById('company-modal').addEventListener('click', function(e) {
      if (e.target === this) {
        closeCompanyModal();
      }
    });

    // Close modal with Escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeCompanyModal();
      }
    });
  </script>
</body>
</html>
