<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Blest Lead Discovery{% endblock %}</title>
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface-hover: #263549;
      --border: #2d3f55;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --green: #4ade80;
      --amber: #fbbf24;
      --red: #f87171;
      --purple: #a78bfa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Header */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .logo span { color: var(--accent); }
    nav { display: flex; gap: 1.5rem; align-items: center; }
    nav a { color: var(--muted); font-size: 0.9rem; }
    nav a:hover { color: var(--text); text-decoration: none; }

    /* Layout */
    main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem 1.5rem;
    }

    /* Badges */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .badge-green  { background: #14532d; color: var(--green); }
    .badge-amber  { background: #451a03; color: var(--amber); }
    .badge-red    { background: #450a0a; color: var(--red); }
    .badge-blue   { background: #0c4a6e; color: var(--accent); }
    .badge-muted  { background: #1e293b; color: var(--muted); border: 1px solid var(--border); }

    /* Score pill */
    .score {
      display: inline-block;
      min-width: 40px;
      text-align: center;
      padding: 0.1rem 0.5rem;
      border-radius: 6px;
      font-weight: 700;
      font-size: 0.85rem;
    }
    .score-high { background: #14532d; color: var(--green); }
    .score-mid  { background: #451a03; color: var(--amber); }
    .score-low  { background: #450a0a; color: var(--red); }

    /* Section headers */
    .section-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 1rem;
    }

    /* Utility */
    .text-muted { color: var(--muted); }
    .text-green { color: var(--green); }
    .text-amber { color: var(--amber); }
    .text-red   { color: var(--red); }
    .text-accent { color: var(--accent); }
    .mt-1 { margin-top: 0.5rem; }
    .mt-2 { margin-top: 1rem; }
    .mt-3 { margin-top: 1.5rem; }
    .mt-4 { margin-top: 2rem; }
    .gap-2 { gap: 1rem; }
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .wrap { flex-wrap: wrap; }
    .grid-2 { display: grid; grid-template-columns: repeat(auto-fill, minmax(480px, 1fr)); gap: 1rem; }
  </style>
</head>
<body>
  <header>
    <div class="logo">🎯 <span>Blest</span> Lead Discovery</div>
    <nav>
      <a href="/">All Runs</a>
      <a href="/run/latest">Latest Report →</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
