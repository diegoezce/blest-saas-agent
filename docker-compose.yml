services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: blest
      POSTGRES_PASSWORD: blest
      POSTGRES_DB: blest_leads
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blest -d blest_leads"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@blest.com
      PGADMIN_DEFAULT_PASSWORD: blest
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
